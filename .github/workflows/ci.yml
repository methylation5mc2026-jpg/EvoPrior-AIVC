name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  smoke:
    name: no-data smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run release-targeted tests
        run: |
          python -m pytest -p no:cacheprovider --basetemp .tmp_pytest_ci \
            tests/test_release_smoke_config.py \
            tests/test_release_artifact_manifest.py \
            tests/test_official_gears_diagnostics.py

      - name: Run no-data release smoke
        run: |
          python scripts/run_release_smoke.py --config configs/experiment/release_smoke_v019.yaml
