experiment_id: v0.9-kang-evoprior-additive
mode: real_kang_evoprior_additive
seed: 91
output_root: outputs/runs
output_prefix: v0.9-integrated-evoprior-additive
dataset_id: kang_2018_pbmc_ifnb
data_config: configs/data/real_multicell_v06.yaml
lineage_config: configs/priors/lineage_real_multicell_v06.yaml
gene_prior_config: configs/priors/gene_prior_real_v08.yaml
gene_prior_label: hgnc_gene_prior

preprocessing:
  seed: 91
  max_cells:
  min_cells_per_gene: 10
  max_genes: 2000

pseudobulk:
  groupby:
    - cell_type
    - perturbation
    - donor
  min_cells: 5
  aggregation: mean

delta:
  control_label: ctrl
  match_columns:
    - cell_type
    - donor
  control_fallback: raise

splits:
  control_usage: control_observed_ood
  heldout_cell_type_suite:
    min_test_groups: 3
    min_control_groups: 1
    min_train_groups: 3
    val_fraction: 0.0
    seed: 911

lineage_baseline:
  tau: 1.5
  shrinkage: 0.85
  fallback_mode: global

gene_prior_correction:
  mode: residual_additive
  alpha: 1.0
  impute_strategy: median

evoprior_additive:
  tau_lineage: 1.5
  alpha_shrinkage: 1.0
  min_groups_per_effect: 1
  fallback_mode: global
  impute_strategy: median

evaluation:
  metric_columns:
    - mae_delta
    - mse_delta
    - pearson_delta
    - spearman_logfc
  de_ks:
    - 20
    - 50
    - 100

reporting:
  audit_title: v0.9 Kang EvoPriorAdditive Component Audit
  claim_boundary: Kang v0.9 integrates control, perturbation, lineage, and real HGNC metadata priors in a non-neural additive model. Results are preliminary and project-split-specific. HGNC metadata is not a true evolutionary/conservation prior.
  limitations:
    - No neural EvoPrior model is implemented.
    - HGNC metadata does not provide orthology, conservation score, or gene age.
    - Kang is a single-stimulus PBMC IFN-beta dataset with project-defined held-out cell-type splits.
