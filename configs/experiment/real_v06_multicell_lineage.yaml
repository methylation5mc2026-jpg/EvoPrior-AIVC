experiment_id: v0.6-real-multicell-lineage-benchmark
seed: 60
output_root: outputs/runs
output_prefix: v0.6-real-multicell-lineage-benchmark
dataset_id: kang_2018_pbmc_ifnb
data_config: configs/data/real_multicell_v06.yaml
lineage_config: configs/priors/lineage_real_multicell_v06.yaml

preprocessing:
  seed: 60
  max_cells:
  min_cells_per_gene: 10
  max_genes: 2000

pseudobulk:
  groupby:
    - cell_type
    - perturbation
    - donor
  min_cells: 5
  aggregation: mean

delta:
  control_label: ctrl
  match_columns:
    - cell_type
    - donor
  control_fallback: raise

features:
  allowed_feature_columns:
    - control_expression
    - perturbation
    - cell_type
    - donor
    - lineage_distance

splits:
  control_usage: control_observed_ood
  heldout_cell_type_suite:
    enabled: true
    min_test_groups: 3
    min_control_groups: 1
    min_train_groups: 3
    val_fraction: 0.0
    seed: 601
  heldout_lineage_suite:
    enabled: true
    candidate_clades:
      - lymphoid
      - myeloid
    min_test_groups: 6
    min_train_groups: 6
    val_fraction: 0.0
    seed: 701

lineage_baseline:
  tau: 1.5
  shrinkage: 0.85
  fallback_mode: global

baselines:
  - name: control_mean
  - name: mean_delta
    fallback: global
  - name: perturbation_mean_delta_v2
    fallback: global
  - name: hierarchical_additive
    alpha: 5.0
  - name: ridge_cv
    alphas:
      - 0.1
      - 1.0
      - 10.0
  - name: lineage_shrinkage

evaluation:
  metric_columns:
    - mae_delta
    - mse_delta
    - pearson_delta
    - spearman_logfc
  de_ks:
    - 20
    - 50
    - 100
  retrieval_pds:
    enabled: false
    reason: Kang v0.6 has one non-control perturbation, so perturbation retrieval/PDS is not informative.

reporting:
  claim_boundary: Real PBMC IFN-beta held-out cell-type benchmark; result is preliminary, dataset-specific, and not SOTA or general lineage-prior evidence.
  limitations:
    - Kang has one non-control perturbation, stim, so perturbation retrieval is not meaningful.
    - Megakaryocytes are underpowered after donor-level pseudobulk filtering and may be skipped.
    - min_cells_per_group is set to 5 to preserve donor-matched control/stim pairs for rare PBMC subsets, which may increase pseudobulk noise.
    - Lineage mapping is a coarse operational PBMC prior, not an ontology-grade lineage assertion.
    - This run is not aligned to a public leaderboard split.
