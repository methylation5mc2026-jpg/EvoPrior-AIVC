experiment_id: v0.17-norman-validated-residual-baseline
mode: norman_residual_multiseed_validation
seed: 170
seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
output_root: outputs/runs
output_prefix: v0.17-norman-validated-residual-baseline
benchmark_id: gears_norman_scperturb_v013
dataset_id: gears_norman_scperturb_v013
data_config: configs/data/gears_norman_v013.yaml

benchmark:
  selected_benchmark: NormanWeissman2019 filtered Perturb-seq from scPerturb
  official_alignment_status: gears_compatible_internal_validated_residual_baseline
  official_alignment_notes: GEARS-compatible internal split only; official GEARS split and metrics are not imported.
  source: https://zenodo.org/records/13350497
  source_version: scPerturb Zenodo record v1.4, NormanWeissman2019_filtered.h5ad
  split_definition: v0.14 internal GEARS-compatible seen0/seen1/seen2/random_combo combo split
  metric_status: GEARS-compatible internal metrics, not official leaderboard metrics

preprocessing:
  seed: 170
  max_cells:
  min_cells_per_gene: 10
  max_genes: 3000

pseudobulk:
  groupby:
    - cell_type
    - perturbation
    - perturbation_type
    - perturbation_genes
  layer:
  min_cells: 20
  aggregation: mean

delta:
  control_label: control
  match_columns:
    - cell_type
  control_fallback: global

split:
  mode: gears_compatible_combo_with_random_combo
  seed: 1400
  seen_gene_fraction: 0.7
  test_combo_fraction: 0.22
  random_combo_fraction: 0.08
  val_fraction: 0.1
  min_test_combos_per_class: 1

features:
  allowed_feature_columns:
    - perturbation
    - perturbation_type
    - perturbation_genes
    - cell_type
    - split_class
  leakage_policy: train-only residual fitting; validation-only model selection; test used once

selection:
  split: val
  metric: mae_delta
  mode: minimize
  tie_breakers:
    - mse_delta
    - pearson_delta_desc

selected_model:
  candidate_id: weighted_pca_ridge_s075_a10
  base_model: weighted_combo_additive
  residual_model: pca_ridge
  residual_scale: 0.75
  alpha: 10.0
  pca_components: 16
  random_state_base: 1700

reference_baselines:
  - name: single_effect_additive_combo
    missing_single_fallback: global_single_mean
  - name: weighted_combo_additive
    missing_single_fallback: global_single_mean
    ridge_alpha: 1.0

ablation_models:
  - candidate_id: base_single_additive_only
    base_model: single_effect_additive_combo
    residual_model: none
    residual_scale: 0.0
    alpha: 1.0
    pca_components: 16
  - candidate_id: base_weighted_additive_only
    base_model: weighted_combo_additive
    residual_model: none
    residual_scale: 0.0
    alpha: 1.0
    pca_components: 16
  - candidate_id: pca_ridge_residual_only
    base_model: zero_delta
    residual_model: pca_ridge
    residual_scale: 1.0
    alpha: 10.0
    pca_components: 16
  - candidate_id: weighted_pca_ridge_s025
    base_model: weighted_combo_additive
    residual_model: pca_ridge
    residual_scale: 0.25
    alpha: 10.0
    pca_components: 16
  - candidate_id: weighted_pca_ridge_s050
    base_model: weighted_combo_additive
    residual_model: pca_ridge
    residual_scale: 0.5
    alpha: 10.0
    pca_components: 16
  - candidate_id: weighted_pca_ridge_s075
    base_model: weighted_combo_additive
    residual_model: pca_ridge
    residual_scale: 0.75
    alpha: 10.0
    pca_components: 16
  - candidate_id: weighted_pca_ridge_s100
    base_model: weighted_combo_additive
    residual_model: pca_ridge
    residual_scale: 1.0
    alpha: 10.0
    pca_components: 16
  - candidate_id: weighted_no_pca_direct_ridge_s050
    base_model: weighted_combo_additive
    residual_model: ridge
    residual_scale: 0.5
    alpha: 100.0
    pca_components: 16
  - candidate_id: weighted_no_pca_direct_ridge_s075
    base_model: weighted_combo_additive
    residual_model: ridge
    residual_scale: 0.75
    alpha: 100.0
    pca_components: 16
  - candidate_id: shuffled_residual_target_control
    base_model: weighted_combo_additive
    residual_model: pca_ridge
    residual_scale: 0.75
    alpha: 10.0
    pca_components: 16
    residual_target_shuffle: true
  - candidate_id: shuffled_perturbation_feature_control
    base_model: weighted_combo_additive
    residual_model: pca_ridge
    residual_scale: 0.75
    alpha: 10.0
    pca_components: 16
    metadata_feature_shuffle: true

comparison_reference:
  rows:
    - label: v0.14_weighted_combo_additive
      split: test
      mae_delta: 0.5660
      mse_delta: 6.6759
      pearson_delta: 0.7599
      spearman_logfc: 0.6390
    - label: v0.14_single_effect_additive_combo
      split: test
      mae_delta: 0.5745
      mse_delta: 6.7388
      pearson_delta: 0.7684
      spearman_logfc: 0.6443
    - label: v0.15_fast_combo_mlp_pca_sklearn
      split: test
      mae_delta: 0.5877
      mse_delta: 7.5517
      pearson_delta: 0.7134
      spearman_logfc: 0.6317
    - label: v0.16_weighted_pca_ridge_s075_a10
      split: test
      mae_delta: 0.43077488199864195
      mse_delta: 3.6688881208428397
      pearson_delta: 0.8692233366397961
      spearman_logfc: 0.7849988030236964

evaluation:
  metric_columns:
    - mae_delta
    - mse_delta
    - pearson_delta
    - spearman_logfc
  de_ks:
    - 20
    - 50

official_gears:
  status: import_ok_but_wrapper_metrics_not_implemented
  dry_run_command: python scripts/run_official_gears_wrapper.py --config configs/experiment/gears_norman_v014_official_wrapper.yaml --dry-run

reporting:
  claim_boundary: v0.17 validates a project-owned residual baseline on the fixed public Norman/scPerturb GEARS-compatible internal split. It is not official GEARS, not leaderboard-comparable, not SOTA, and not biological discovery.
