experiment_id: v0.9-synthetic-integrated-evoprior-additive
mode: synthetic_integrated_evoprior
seed: 90
output_root: outputs/runs
output_prefix: v0.9-integrated-evoprior-additive
dataset_id: synthetic_integrated
gene_prior_label: synthetic_gene_prior

synthetic:
  n_genes: 120
  cells_per_group: 6

pseudobulk:
  groupby:
    - cell_type
    - perturbation
    - donor
  min_cells: 3
  aggregation: mean

delta:
  control_label: control
  match_columns:
    - cell_type
    - donor

splits:
  heldout_cell_types:
    - cd8_like
    - b_like
    - nk_like
    - mono_like
    - dc_like

lineage_baseline:
  tau: 1.5
  shrinkage: 0.85
  fallback_mode: global

gene_prior_correction:
  mode: residual_additive
  alpha: 0.1
  impute_strategy: median

evoprior_additive:
  tau_lineage: 1.5
  alpha_shrinkage: 1.0
  min_groups_per_effect: 1
  fallback_mode: global
  impute_strategy: median

evaluation:
  metric_columns:
    - mae_delta
    - mse_delta
    - pearson_delta
    - spearman_logfc
  de_ks:
    - 20
    - 50
    - 100
  prior_modulated_gene_prefixes:
    - SGENE000
    - SGENE001

reporting:
  claim_boundary: Synthetic integrated benchmark validates v0.9 plumbing and ablation logic only. It is not biological evidence.
  audit_title: v0.9 Synthetic Integrated Component Audit
