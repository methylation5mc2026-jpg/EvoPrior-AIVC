experiment_id: v0.7-kang-gene-prior-compatibility
mode: real_kang_gene_prior
seed: 71
output_root: outputs/runs
output_prefix: v0.7-gene-evolutionary-prior
dataset_id: kang_2018_pbmc_ifnb
data_config: configs/data/real_multicell_v06.yaml
lineage_config: configs/priors/lineage_real_multicell_v06.yaml
gene_prior_config: configs/priors/gene_prior_kang_v07.yaml

preprocessing:
  seed: 71
  max_cells:
  min_cells_per_gene: 10
  max_genes: 2000

pseudobulk:
  groupby:
    - cell_type
    - perturbation
    - donor
  min_cells: 5
  aggregation: mean

delta:
  control_label: ctrl
  match_columns:
    - cell_type
    - donor
  control_fallback: raise

splits:
  control_usage: control_observed_ood
  heldout_cell_type_suite:
    min_test_groups: 3
    min_control_groups: 1
    min_train_groups: 3
    val_fraction: 0.0
    seed: 711

lineage_baseline:
  tau: 1.5
  shrinkage: 0.85
  fallback_mode: global

gene_prior_correction:
  mode: residual_additive
  alpha: 1.0
  impute_strategy: median

evaluation:
  metric_columns:
    - mae_delta
    - mse_delta
    - pearson_delta
    - spearman_logfc
  de_ks:
    - 20
    - 50
    - 100

reporting:
  claim_boundary: Kang v0.7 uses an engineering-only placeholder gene prior. This is compatibility-only and does not test real evolutionary-prior benefit.
  limitations:
    - No versioned meaningful external gene-prior annotation is used.
    - Placeholder features are deterministic but synthetic.
    - Any metric differences are engineering diagnostics, not biological evidence.
