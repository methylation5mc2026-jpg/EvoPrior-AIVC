release_id: v0.24-github-push-and-release-or-website-integration
output_root: outputs/release/v0.24
include_zip: true

repository:
  expected_branch: feat/github-push-release-website-v024
  rollback_tag: v0.23-github-publish-or-project-page-assets

primary_evidence:
  dataset: NormanWeissman2019_filtered.h5ad
  dataset_md5: c870e6967d91c017d9da827bab183cd6
  split: fixed internal GEARS-compatible Norman seen0/seen1/seen2/random_combo split
  config: configs/experiment/gears_norman_v017_multiseed_residual.yaml
  command: python scripts/run_norman_residual_multiseed.py --config configs/experiment/gears_norman_v017_multiseed_residual.yaml
  output_dir: outputs/runs/v0.17-norman-validated-residual-baseline/gears_norman_scperturb_v013/20260625T100322Z/
  split_manifest: outputs/runs/v0.17-norman-validated-residual-baseline/gears_norman_scperturb_v013/20260625T100322Z/split_manifest.csv
  smoke_result: outputs/runs/v0.19-release-smoke/20260626T024213Z/
  artifact_manifest: reports/v0.24_artifact_manifest.md
  metrics:
    mae: 0.430778
    mse: 3.668870
    pearson: 0.869224
    spearman: 0.784976
    seeds: [0, 1, 2, 3, 4]

claim_boundary:
  allowed:
    - GitHub publish command package, Release draft, website integration assets, public link audit, and mentor presentation summary.
    - Strong internal GEARS-compatible Norman result under the documented split and metrics.
    - Reproducibility package around the validated v0.17 Norman residual baseline.
  forbidden:
    - Official GEARS result.
    - Leaderboard-comparable result.
    - SOTA claim.
    - Biological discovery claim.
    - Clinical claim.
    - General model superiority claim.
    - Claim that GitHub was pushed or a website was updated by v0.24.

reference_files:
  - README.md
  - docs/V18_RELEASE_MODEL_CARD.md
  - docs/V18_BENCHMARK_CARD.md
  - docs/V18_REPRODUCIBILITY_RUNBOOK.md
  - docs/V18_EXTERNAL_REVIEW_INDEX.md
  - docs/V21_PUBLIC_DATA_ACQUISITION_GUIDE.md
  - docs/V22_GITHUB_RELEASE_NOTES_FINAL.md
  - docs/V22_PUBLIC_DEMO_GUIDE.md
  - docs/V23_GITHUB_PUBLISH_GUIDE.md
  - docs/V23_GITHUB_RELEASE_BODY.md
  - docs/V23_PROJECT_PAGE_ASSETS.md
  - docs/V23_MENTOR_REVIEW_BRIEF.md
  - docs/V24_GITHUB_PUBLISH_STATUS.md
  - docs/V24_GITHUB_RELEASE_DRAFT.md
  - docs/V24_GITHUB_PUBLISH_COMMANDS.md
  - docs/V24_WEBSITE_INTEGRATION_ASSETS.md
  - docs/V24_POST_PUBLISH_CHECKLIST.md
  - docs/V24_PUBLIC_LINK_AUDIT.md
  - docs/V24_FINAL_PRESENTATION_SUMMARY.md
  - reports/v0.24_final_presentation_summary.md

reproduction_commands:
  no_data:
    - python -m pip install -e ".[dev]"
    - python -m pytest -p no:cacheprovider --basetemp .tmp_pytest_local tests/test_release_smoke_config.py tests/test_release_artifact_manifest.py tests/test_make_release_bundle.py tests/test_ci_workflow_static.py
    - python scripts/check_ci_workflow.py --workflow .github/workflows/ci.yml
    - python scripts/run_release_smoke.py --config configs/experiment/release_smoke_v019.yaml
    - python scripts/make_release_bundle.py --config configs/release/v024_release_bundle.yaml
    - python scripts/check_release_artifacts.py
  with_local_data:
    - python scripts/prepare_gears_norman.py --config configs/data/gears_norman_v013.yaml --dry-run
    - python scripts/run_norman_residual_multiseed.py --config configs/experiment/gears_norman_v017_multiseed_residual.yaml
    - python scripts/check_release_artifacts.py
